<!DOCTYPE html>
<html>

<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no, minimal-ui">
  <meta name="theme-color" content="#1a1f27">
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-status-bar-style" content="#1a1f27">
  <meta name="apple-mobile-web-app-status-bar-style" content="#1a1f27">
  <meta name="apple-mobile-web-app-title" content="Zawia">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Zawia</title>
  <link rel="manifest" href="manifest.json">

  <!-- JavaScript to Hide URL Bar -->
  <script>
    // Automatically hide URL bar on mobile devices
    document.addEventListener('DOMContentLoaded', () => {
      function hideURLBar() {
        setTimeout(() => {
          window.scrollTo(0, 1);
        }, 0); // Small delay to trigger the scroll event
      }
      hideURLBar();

      // Reapply on orientation change
      window.addEventListener('orientationchange', hideURLBar);
    });
  </script>

  <!-- Styling for loading indicator -->
  <style>
    @font-face {
      font-family: 'Ketupat';
      src: url('fonts/Ketupat Ramadhan.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }


    body {
      background: #1a1f27;
    }

    #load {
      position: absolute;
      width: 600px;
      height: 36px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: visible;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      cursor: default;
    }

    #load div {
      position: relative;
      width: 30px;
      height: 54px;
      opacity: 0;
      font-family: "Ketupat", sans-serif;
      animation: blurEffect 2s linear infinite;
      -o-animation: blurEffect 2s linear infinite;
      -moz-animation: blurEffect 2s linear infinite;
      -webkit-animation: blurEffect 2s linear infinite;
      color: #f3cf63;
    }

    #load div:nth-child(2) {
      animation-delay: 0.2s;
      -o-animation-delay: 0.2s;
      -moz-animation-delay: 0.2s;
      -webkit-animation-delay: 0.2s;
    }

    /* #load div:nth-child(3) {
      animation-delay: 0.4s;
      -o-animation-delay: 0.4s;
      -webkit-animation-delay: 0.4s;
      -webkit-animation-delay: 0.4s;
    }

    #load div:nth-child(4) {
      animation-delay: 0.6s;
      -o-animation-delay: 0.6s;
      -moz-animation-delay: 0.6s;
      -webkit-animation-delay: 0.6s;
    }

    #load div:nth-child(5) {
      animation-delay: 0.8s;
      -o-animation-delay: 0.8s;
      -moz-animation-delay: 0.8s;
      -webkit-animation-delay: 0.8s;
    }

    #load div:nth-child(6) {
      animation-delay: 1s;
      -o-animation-delay: 1s;
      -moz-animation-delay: 1s;
      -webkit-animation-delay: 1s;
    }

    #load div:nth-child(7) {
      animation-delay: 1.2s;
      -o-animation-delay: 1.2s;
      -moz-animation-delay: 1.2s;
      -webkit-animation-delay: 1.2s;
    } */

    @keyframes blurEffect {
      0% {
        opacity: 0;
        filter: blur(5px);
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        filter: blur(0px);
        transform: scale(1.2);
      }

      100% {
        opacity: 0;
        filter: blur(5px);
        transform: scale(0.8);
      }
    }

    @-moz-keyframes blurEffect {
      0% {
        opacity: 0;
        filter: blur(5px);
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        filter: blur(0px);
        transform: scale(1.2);
      }

      100% {
        opacity: 0;
        filter: blur(5px);
        transform: scale(0.8);
      }
    }

    @-webkit-keyframes blurEffect {
      0% {
        opacity: 0;
        filter: blur(5px);
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        filter: blur(0px);
        transform: scale(1.2);
      }

      100% {
        opacity: 0;
        filter: blur(5px);
        transform: scale(0.8);
      }
    }

    @-o-keyframes blurEffect {
      0% {
        opacity: 0;
        filter: blur(5px);
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        filter: blur(0px);
        transform: scale(1.2);
      }

      100% {
        opacity: 0;
        filter: blur(5px);
        transform: scale(0.8);
      }
    }
  </style>


</head>

<body>
  <!-- Loading Indicator -->
  <div id="load">
    <div>Zawia</div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("flutter-first-frame", function () {
        navigator.serviceWorker.register("flutter_service_worker.js");
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.onload = function () {
      setTimeout(function () {
        var loadingIndicator = document.getElementById("loading_container");
        if (loadingIndicator) {
          loadingIndicator.remove();
        }
      }, 9000);
    };
  </script>

</body>

</html>
